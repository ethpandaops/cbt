version: 2
updates:
   - package-ecosystem: github-actions
     directory: /
     schedule:
        interval: monthly
     groups:
        actions:
           patterns:
              - '*'
   - package-ecosystem: gomod
     directory: /
     schedule:
        interval: weekly
     groups:
        go-deps:
           patterns:
              - '*'
   - package-ecosystem: npm
     directory: /frontend
     schedule:
        interval: weekly
     groups:
        npm-deps:
           patterns:
              - '*'
