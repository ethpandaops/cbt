<!doctype html>
<html lang="en" itemscope="" itemtype="http://schema.org/Webpage">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#f6f6f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Initialize theme before React mounts to prevent FOUC
      (function () {
        var themeColors = { light: '#f6f6f6', dark: '#1a1a1a' };
        var theme = localStorage.getItem('theme');
        var resolved = 'light';

        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          resolved = 'dark';
        } else if (theme === 'light') {
          // Light theme is default, no class needed
        } else {
          // No theme set, use system preference
          var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) {
            document.documentElement.classList.add('dark');
            resolved = 'dark';
          }
        }

        // Set theme-color meta tag to match resolved theme
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', themeColors[resolved]);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
